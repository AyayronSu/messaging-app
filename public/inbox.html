<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Inbox</h2>
        <div class="messages"></div>

        <h3>Send a message</h3>
        <select id="recipient"></select>
        <textarea id="message-content" placeholder="Message"></textarea>
        <button id="send-btn">Send</button>

        <button id="profile-btn">Go to Profile</button>
    </div>

    <script src="app.js"></script>
    <script>
        requireAuth();

        async function loadMessages() {
            const messages = await fetchWithAuth(`${API_URL}/messages`);
            const container = document.getElementById('messages');
            container.innerHTML = '';
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message';
                div.innerHTML = `<strong>${msg.senderId.username}:</strong> <span class="message-content">${msg.content}</span>`;
                container.appendChild(div);
            });
        }

        async function loadUsers() {
            const users = await fetch(`${API_URL}/auth/users`).then(res => res.json());
            const select = document.getElementById('recipient');

            users.forEach(user => {
                const option = document.createElement('option');
                option.value = user._id;
                option.textContent = user.username;
                select.appendChild(option);
            });
        }

        loadUsers();

        document.getElementById('send-btn').addEventListener('click', async () => {
            const recipientId = document.getElementById('recipient').value;
            const content = document.getElementById('message-content').value;
            const res = await fetchWithAuth(`${API_URL}/messages`, {
                method: 'POST',
                body: JSON.stringify({ recipientId, content })
            });
            if (res._id) {
                document.getElementById('message-content').value = '';
                loadMessages();
            } else {
                alert(res.error || 'Failed to send message');
            }
        });

        document.getElementById('profile-btn').addEventListener('click', () => {
            window.location.href = 'profile.html';
        });

        loadMessages();
    </script>
</body>
</html>
